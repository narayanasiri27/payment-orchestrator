server:
  port: 8080

spring:
  application:
    name: payment-orchestrator
  datasource:
    url: jdbc:h2:mem:payments;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  orchestration:
    maxAttemptsPerProvider: 2

springdoc:
  swagger-ui:
    path: /swagger-ui.html
